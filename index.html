<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#15120d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="품새 수련" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./www/assets/app-icon-1024.png" />
    <link rel="apple-touch-icon" href="./www/assets/app-icon-1024.png" />
    <title>태권도 품새 수련</title>
    <meta http-equiv="refresh" content="0; url=./www/index.html" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #111827;
      }
      main {
        width: min(560px, calc(100vw - 32px));
        padding: 28px;
        border: 1px solid #dbe3ef;
        border-radius: 16px;
        background: #ffffff;
      }
      a {
        color: #2563eb;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>품새 AI 분석으로 이동 중입니다</h1>
      <p>자동으로 이동하지 않으면 <a href="./www/index.html">여기를 누르세요</a>.</p>
    </main>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => navigator.serviceWorker.register("./service-worker.js", { scope: "./" }).catch(() => {}));
      }
    </script>
  </body>
</html>
